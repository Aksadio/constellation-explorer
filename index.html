<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constellation Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="ui">
    <div class="title-block">
      <h1 class="title">CONSTELLATION<br><span>EXPLORER</span></h1>
      <p class="subtitle">Click to birth stars · Drag to connect · Double-click to name</p>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>STARS</label>
        <span id="star-count">0</span>
      </div>
      <div class="control-group">
        <label>LINKS</label>
        <span id="link-count">0</span>
      </div>
      <div class="control-group">
        <label>MODE</label>
        <span id="mode-label">FREE</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="btn-mode" title="Toggle connect mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/></svg>
        Connect
      </button>
      <button class="btn" id="btn-clear" title="Clear all">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        Clear
      </button>
      <button class="btn" id="btn-save" title="Save as image">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Save
      </button>
      <button class="btn" id="btn-random" title="Generate random constellation">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        Random
      </button>
    </div>
  </div>

  <!-- Name modal -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <p class="modal-label">Name this constellation</p>
      <input class="modal-input" id="modal-input" type="text" maxlength="24" placeholder="e.g. Orion..." />
      <div class="modal-actions">
        <button class="btn" id="modal-cancel">Cancel</button>
        <button class="btn btn-accent" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip"></div>

  <script src="app.js"></script>
</body>
</html>
